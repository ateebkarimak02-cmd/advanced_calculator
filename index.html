<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="greeting active">
      <p>welcome to calculator..</p>
    </div>
    <div class="container">
      <input type="text" name="input" id="input" placeholder="0" />
      <div class="box">
        <button id="AC">AC</button>
        <button id="delete">DEL</button>
        <button id="modolus">%</button>
        <button id="divide">/</button>
      </div>
      <div class="box">
        <button>8</button>
        <button>7</button>
        <button>9</button>
        <button id="multiply">X</button>
      </div>
      <div class="box">
        <button>5</button>
        <button>4</button>
        <button>6</button>
        <button id="subtract">-</button>
      </div>
      <div class="box">
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button id="add">+</button>
      </div>
      <div class="box">
        <button>00</button>
        <button>0</button>
        <button>.</button>
        <button id="equal">=</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
